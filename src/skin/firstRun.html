<!doctype html>
<html>
<head>
  <title class="i18n_firstRun_title"></title>
  <meta charset="utf-8">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link type="text/css" href="css/firstRun.css" rel="stylesheet" />
  <script type="text/javascript" src="/lib/vendor/jquery-3.7.1.js"></script>
  <script type="module" src="/lib/i18n.js"></script>
  <script type="text/javascript" src="js/firstRun.js"></script>
</head>
<body>
  <div class="grid-container full">

    <div class="top-bar small-12 align-center cell">
      <img id="eff-logo" src="images/eff-logo.png" alt="">
      <span class="i18n_intro_eff_header" data-i18n_contents_placeholders="<b><a href='https://www.eff.org/' target='_blank'>@@</a></b>"></span>
    </div>

    <!-- Pin nudge shown on Chromium browsers -->
    <div id="pb-features-pin" class="align-center">
      <div class="cell">
        <h3 class="i18n_intro_nag_header"></h3>
        <p id="pinning-instructions" class="i18n_intro_pin_nudge" data-i18n_contents_placeholders="i18n_popup_disable_for_site"></p>
      </div>
      <div class="small-12 large-3 cell">
        <div id="pinning-instructions-reduced-motion">
          <img src="images/pinning-instructions-reduced-motion-1.png" alt="i18n_intro_pin_instructions">
          <img src="images/pinning-instructions-reduced-motion-2.png" alt="">
        </div>
        <img id="pinning-instructions-animation" src="images/pinning-animation.gif" alt="i18n_intro_pin_instructions">
        <button id="toggle-animation-btn">
          <span id="toggle-animation-icon" aria-hidden="true">⏸</span> <span id="toggle-animation-label">Stop Animation</span>
        </button>
      </div>
    </div>

    <!-- Disable button instructions -->
    <div id="pb-features-0" class="align-center">
      <div class="cell">
        <h3 class="i18n_intro_disable_header"></h3>
        <p class="i18n_intro_disable_button_context"></p>
        <p id="disable-button-intro" class="i18n_intro_disable_button" data-i18n_contents_placeholders="<b>@@i18n_popup_disable_for_site@@</b>"></p>
      </div>
      <div class="small-12 large-3 cell">
        <img src="images/popup-disable-button.png" alt="">
      </div>
    </div>

    <!-- Nudge to try opening the popup -->
    <div id="pb-settings" class="small-12 medium-10 align-center text-center cell">
      <div>
        <h3 class="i18n_intro_open_popup"></h3>
        <div id="toolbar-img-container">
          <img src="images/toolbar-icon-circled.png" alt="i18n_intro_open_popup_alt" id="toolbar-icon">
        </div>
      </div>
    </div>

    <!-- Intro to Privacy Badger features -->
    <div class="grid-x grid-padding-x align-center">
      <div class="small-12 medium-10 text-center cell">
         <h3 class="i18n_intro_features_header"></h3>
         <h3 class="i18n_intro_features_subheader"></h3>
      </div>
      <div class="caret-down align-center cell">
        <img src="images/carrot-down.svg" alt="">
      </div>
    </div>

    <!-- privacy badger features -->
    <div id="pb-features-1" class="align-center">
      <div class="small-12 large-3 cell">
        <img src="images/popup-collapsed-screenshot.png" alt="">
      </div>
      <div class="cell">
        <h3 class="i18n_intro_beyond_ads"></h3>
        <p class="i18n_intro_beyond_ads_paragraph"></p>
        <p class="i18n_intro_beyond_ads_paragraph2"></p>
      </div>
    </div>
    <div id="pb-features-2" class="align-center">
      <div class="cell hide-for-small-only">
        <h3 class="i18n_intro_not_an_adblocker"></h3>
        <p class="i18n_intro_learns_paragraph"></p>
        <p class="i18n_intro_not_an_adblocker_paragraph2"></p>
      </div>
      <div class="small-12 large-3 cell">
        <img src="images/not-ad-blocker.png" alt="">
      </div>
      <div class="cell hide-for-large hide-for-medium">
        <h3 class="i18n_intro_not_an_adblocker"></h3>
        <p class="i18n_intro_learns_paragraph"></p>
        <p class="i18n_intro_not_an_adblocker_paragraph2"></p>
      </div>
    </div>

    <!-- donate ask -->
    <div id="pb-donate" class="align-center">
      <div class="text-center">
        <div id="badger-img-container">
          <img src="images/pb-logo-outline.svg" alt="">
        </div>
        <h3 class="i18n_intro_donate_heading"></h3>
        <p class="i18n_intro_donate1 text"></p>
      </div>
    </div>
    <div id="pb-donate-help" class="align-center">
      <h4 class="i18n_intro_donate_subheading"></h4>
    </div>
    <div id="pb-donate-button" class="align-center">
      <div class="text-center">
        <a class="i18n_donate_to_eff button large" target="_blank" href="https://supporters.eff.org/donate/support-privacy-badger"></a>
      </div>
    </div>
    <!-- social media icons -->
    <div id="share-container">
      <h4 class="i18n_share_title text-center"></h4>
      <div class="share-links">
        <a class="share-facebook" title="i18n_share_button_title_facebook" aria-label="i18n_share_button_title_facebook" target="_blank" rel="noopener noreferrer" href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fprivacybadger.org%2F">
          <i></i>
        </a>
        <a class="share-mastodon" title="i18n_share_button_title_mastodon" aria-label="i18n_share_button_title_mastodon" target="_blank" rel="noopener noreferrer" href="https://mastodonshare.com/?text=I%20just%20installed%20Privacy%20Badger%2C%20a%20browser%20extension%20from%20%40eff%40mastodon.social%20that%20automatically%20learns%20to%20block%20hidden%20trackers%20https%3A%2F%2Fprivacybadger.org%2F">
          <i></i>
        </a>
        <a class="share-bluesky" title="i18n_share_button_title_bluesky" aria-label="i18n_share_button_title_bluesky" target="_blank" rel="noopener noreferrer" href="https://bsky.app/intent/compose?text=I%20just%20installed%20Privacy%20Badger%2C%20a%20browser%20extension%20from%20%40eff.org%20that%20automatically%20learns%20to%20block%20hidden%20trackers%20https%3A%2F%2Fprivacybadger.org%2F">
          <i></i>
        </a>
      </div>
    </div>
  </div>

  <!-- privacy policy link -->
  <div class="grid-container full">
    <div id="pb-privacy-policy">
      <a class="i18n_intro_link_policy" target="_blank" href="https://www.eff.org/code/privacy/policy"></a>
    </div>
  </div>

</body>
</html>
